<article class="card">
  <div class="card-header">
    <h3 class="card-title">{{ card.title }}</h3>

    @if (isAuthenticated) {
      <div class="card-button-group">
        <button
          pButton
          type="button"
          class="p-button-sm p-button-rounded card-edit-btn"
          [severity]="isEditing ? 'success' : 'contrast'"
          [icon]="isEditing ? 'pi pi-save' : 'pi pi-pencil'"
          [label]="isEditing ? 'Save' : 'Edit'"
          (click)="onEditAction()"
        ></button>
        @if (isEditing) {
          <button
            pButton
            type="button"
            class="p-button-sm p-button-rounded card-cancel-btn"
            severity="secondary"
            icon="pi pi-times"
            (click)="onCancelEdit()"
          ></button>
        }
      </div>
    }
  </div>

  @if (card.subtitle) {
    <p class="card-subtitle">{{ card.subtitle }}</p>
  }

  @if (card.elements && card.elements.length > 0) {
    <div class="card-content">
      @for (element of card.elements; track $index) {
        <app-element-renderer
          [element]="element"
          [isEditing]="isEditing"
          (elementChange)="onElementChange($event)"
        ></app-element-renderer>
      }
    </div>
  } @else {
    <p class="empty-message">No content</p>
  }
</article>
