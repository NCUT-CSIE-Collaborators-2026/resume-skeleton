<article class="card">
  <div class="card-header">
    <h3 class="card-title">{{ card.title }}</h3>

    @if (isAuthenticated) {
      <div class="card-button-group">
        <button
          pButton
          type="button"
          class="p-button-sm p-button-rounded card-edit-btn"
          [severity]="isEditing ? 'success' : 'contrast'"
          [icon]="isEditing ? 'pi pi-save' : 'pi pi-pencil'"
          [loading]="isSaving"
          [label]="isEditing ? 'Save' : 'Edit'"
          (click)="onEditAction()"
        ></button>
        @if (isEditing) {
          <button
            pButton
            type="button"
            class="p-button-sm p-button-rounded card-cancel-btn"
            severity="secondary"
            icon="pi pi-times"
            (click)="onCancelEdit()"
          ></button>
        }
      </div>
    }
  </div>

  @if (card.subtitle) {
    <p class="card-subtitle">{{ card.subtitle }}</p>
  }

  @for (element of card.elements; track $index; let elementIndex = $index) {
    <app-tree-card
      [element]="element"
      [elementIndex]="elementIndex"
      [path]="[elementIndex]"
      [isEditing]="isEditing"
      [isSaving]="isSaving"
      [addLabel]="cardUi.addLabel"
      [pendingDeleteItemKeys]="pendingDeleteItemKeys"
      [iconOptions]="iconOptions"
      (textElementChange)="onTextElementChange($event.elementIndex, $event.value)"
      (badgeItemChange)="onBadgeItemChange($event.elementIndex, $event.itemIndex, $event.value)"
      (iconListItemChange)="onIconListItemChange($event.elementIndex, $event.itemIndex, $event.value)"
      (techCategoryChange)="onTechCategoryChange($event.elementIndex, $event.categoryIndex, $event.value)"
      (groupItemChange)="onGroupItemChange($event.elementIndex, $event.groupIndex, $event.itemIndex, $event.value)"
      (groupItemIconChange)="onGroupItemIconChange($event.elementIndex, $event.groupIndex, $event.itemIndex, $event.icon)"
      (groupNameChange)="onGroupNameChange($event.elementIndex, $event.groupIndex, $event.value)"
      (groupIconChange)="onGroupIconChange($event.elementIndex, $event.groupIndex, $event.icon)"
      (addItem)="onAddItem($event)"
      (deleteItem)="onDeleteItem($event)"
    ></app-tree-card>
  }
</article>
