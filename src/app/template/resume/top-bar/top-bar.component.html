<header class="top-bar">
  <div>
    <h1 class="name">{{ profile.name }}</h1>
    <p class="headline">{{ profile.title }}</p>
  </div>

  <div class="action-panel">
    @if (editorUser) {
      <div class="editor-chip" aria-label="editor identity">
        @if (editorUser.picture) {
          <img class="editor-avatar" [src]="editorUser.picture" [alt]="editorUser.name + ' avatar'" />
        } @else {
          <div class="editor-avatar editor-avatar--fallback" aria-hidden="true">
            {{ editorUser.name.charAt(0) }}
          </div>
        }

        <div class="editor-meta">
          <span class="editor-label">編輯中...</span>
        </div>
      </div>
    } @else {
      <button
        class="login-subtle-btn"
        type="button"
        disabled
        title="目前未開放登入"
      >
        <i class="pi pi-google google-icon" aria-hidden="true"></i>
        登入
      </button>
    }

    <div class="lang-switch" aria-label="language selector">
      @for (option of languageOptions; track option.code) {
        <button
          class="lang-btn"
          [class.active]="activeLang === option.code"
          (click)="onLanguageChange(option.code)"
        >
          {{ option.label }}
        </button>
      }
      <button
        class="a4-btn"
        [class.active]="isA4Mode"
        (click)="onA4ModeToggle()"
        title="Toggle A4 aspect ratio"
      >
        <i class="pi pi-rectangle" style="font-size: 0.8rem; margin-right: 0.25rem;"></i>
        A4
      </button>
      <button
        class="download-btn"
        [disabled]="isExporting"
        (click)="onExportPdf()"
        [title]="isExporting ? barUi.exportingLabel : barUi.exportPdfLabel"
      >
        <i
          [class]="isExporting ? 'pi pi-spinner pi-spin' : 'pi pi-download'"
        ></i>
      </button>
    </div>
  </div>
</header>
