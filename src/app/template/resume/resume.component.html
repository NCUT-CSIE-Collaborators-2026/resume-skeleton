<main class="resume-shell" [class.a4-mode]="isA4Mode()">
  <p-toast position="top-right"></p-toast>

  <section class="resume-canvas" #resumeCanvas>
    <app-top-bar
      [profile]="profileInfo()"
      [editorUser]="editorUser()"
      [languageOptions]="languageOptions()"
      [activeLang]="activeLang()"
      [isA4Mode]="isA4Mode()"
      [isExporting]="isExporting()"
      [barUi]="barUi()"
      [topBarUi]="topBarUi()"
      (languageChange)="setLanguage($event)"
      (a4ModeChange)="isA4Mode.set($event)"
      (exportPdf)="exportResumePdf()"
      (logout)="onLogout()"
    ></app-top-bar>

    @if (isContentLoading()) {
      <div class="state-panel">
        <p>Loading resume content from backend...</p>
      </div>
    } @else if (contentError()) {
      <div class="state-panel state-panel--error">
        <p>Failed to load backend content: {{ contentError() }}</p>
      </div>
    } @else {
      <div class="resume-grid">
        @for (card of renderedCards(); track getCardTrackKey(card.id)) {
          <app-resume-card
            [style.--card-span]="card.layout"
            [card]="card"
            [isAuthenticated]="isAuthenticated()"
            [isEditing]="isCardEditing(card.id)"
            [isSaving]="isCardSaving(card.id)"
            [cardUi]="cardUi()"
            [pendingDeleteItemKeys]="getPendingDeleteItemKeys(card.id)"
            (editAction)="onCardEditAction($event)"
            (cancelEdit)="onCardCancelEdit($event)"
            (titleChange)="updateCardTitle($event.cardId, $event.value)"
            (addItem)="addCardItem($event.cardId, $event.path)"
            (deleteItem)="deleteCardItem($event.cardId, $event.elementIndex, $event.itemIndex, $event.treeGroupIndex, $event.categoryIndex, $event.deleteTreeGroup)"
            (textElementChange)="updateTextElement($event.cardId, $event.elementIndex, $event.value)"
            (badgeItemChange)="updateBadgeItem($event.cardId, $event.elementIndex, $event.itemIndex, $event.value)"
            (iconListItemChange)="updateIconListItem($event.cardId, $event.elementIndex, $event.itemIndex, $event.value)"
            (techCategoryChange)="updateTechCategoryValues($event.cardId, $event.elementIndex, $event.categoryIndex, $event.value)"
            (treeGroupItemChange)="updateTreeGroupItemValue($event.cardId, $event.elementIndex, $event.treeGroupIndex, $event.itemIndex, $event.value)"
            (treeGroupItemIconChange)="updateTreeGroupItemIcon($event.cardId, $event.elementIndex, $event.treeGroupIndex, $event.itemIndex, $event.icon)"
            (treeGroupNameChange)="updateTreeGroupName($event.cardId, $event.elementIndex, $event.treeGroupIndex, $event.value)"
            (treeGroupIconChange)="updateTreeGroupIcon($event.cardId, $event.elementIndex, $event.treeGroupIndex, $event.icon)"
          ></app-resume-card>
        }
      </div>
    }
  </section>
</main>
